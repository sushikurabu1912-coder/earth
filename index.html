<!DOCTYPE html>
<html lang="ja">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>QuakeEarth</title>


<link rel="stylesheet"
href="https://unpkg.com/leaflet/dist/leaflet.css">


<style>

html,body{

margin:0;

height:100%;

font-family:sans-serif;

}


#map{

height:100%;

}


#panel{

position:absolute;

z-index:999;

top:10px;

left:10px;

background:white;

padding:12px;

border-radius:10px;

box-shadow:0 0 10px #555;

width:300px;

}


textarea{

width:100%;

height:70px;

}


button{

width:100%;

padding:8px;

margin-top:5px;

}


.eq-pin{

border-radius:50%;

border:2px solid white;

}


</style>

</head>



<body>


<div id="panel">


<h3>🌍 QuakeEarth</h3>



<textarea id="input"

placeholder="2026/06/26 15:41 北緯35.8度 東経138.3度 2.6 10km">

</textarea>



<button onclick="addEarthquake()">

地震追加

</button>



<button onclick="togglePlate()">

プレート境界 ON/OFF

</button>



<button onclick="toggleFault()">

活断層 ON/OFF

</button>



<button onclick="deleteAll()">

地震 全削除

</button>



</div>



<div id="map"></div>



<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>



<script>


const map =

L.map("map")

.setView([36,138],5);



L.tileLayer(

"https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",

{

maxZoom:18

}

).addTo(map);





let pins=[];




// =================
// プレート境界
// =================


let plateLayer;

let plateVisible=false;



fetch("data/plates.json")

.then(r=>r.json())

.then(data=>{


plateLayer =

L.geoJSON(

data,

{


style:{

color:"purple",

weight:4,

dashArray:"10,10"

},


onEachFeature:function(f,l){

l.bindPopup(

"プレート境界<br>"+

f.properties.name

);

}


}

);


});





function togglePlate(){


if(!plateLayer)return;



if(plateVisible){


map.removeLayer(plateLayer);


plateVisible=false;


}

else{


plateLayer.addTo(map);


plateVisible=true;


}


}





// =================
// 活断層
// =================


let faultLayer;

let faultVisible=false;



fetch("data/faults.json")

.then(r=>r.json())

.then(data=>{


faultLayer =

L.geoJSON(

data,

{


style:{

color:"red",

weight:3

},


onEachFeature:function(f,l){

l.bindPopup(

"活断層<br>"+

f.properties.name

);

}


}

);


});





function toggleFault(){


if(!faultLayer)return;



if(faultVisible){


map.removeLayer(faultLayer);


faultVisible=false;


}

else{


faultLayer.addTo(map);


faultVisible=true;


}


}





// =================
// 地震ピン
// =================



function getMagnitudeColor(mag){


if(mag>=7){

return "red";

}


if(mag>=5){

return "orange";

}


if(mag>=3){

return "yellow";

}


return "green";


}





function getPinSize(mag){


return Math.max(

12,

mag*4

);


}







function addEarthquake(){


let text=

document.getElementById("input")

.value.trim();



let a=

text.split(/\s+/);



if(a.length<6){

alert("入力形式エラー");

return;

}



let date=

a[0]+" "+a[1];



let lat=

Number(

a[2]

.replace("北緯","")

.replace("度","")

);



let lon=

Number(

a[3]

.replace("東経","")

.replace("度","")

);



let mag=

Number(a[4]);



let depth=

a[5]

.replace("km","");





let size=

getPinSize(mag);



let color=

getMagnitudeColor(mag);





let icon=

L.divIcon({

className:"eq-pin",


html:

`

<div style="

width:${size}px;

height:${size}px;

background:${color};

border-radius:50%;

"></div>

`,


iconSize:[size,size],


iconAnchor:[

size/2,

size/2

]


});






let marker=

L.marker(

[lat,lon],

{

icon:icon

}

)

.addTo(map);





let index=pins.length;



marker.bindPopup(

`

<h3>${date}</h3>


M ${mag}


<br>


深さ ${depth}km


<br>


北緯 ${lat}


<br>


東経 ${lon}


<br><br>


<button onclick="deletePin(${index})">

この地震を削除

</button>


`

);





pins.push(marker);



map.setView(

[lat,lon],

7

);





// 入力消去

document.getElementById("input").value="";


}





function deletePin(i){


if(pins[i]){


map.removeLayer(pins[i]);


pins[i]=null;


}


}




function deleteAll(){


pins.forEach(p=>{


if(p){

map.removeLayer(p);

}


});


pins=[];


}



</script>



</body>

</html>
