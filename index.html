<!DOCTYPE html>
<html lang="ja">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1">


<title>QuakeEarth</title>


<link rel="stylesheet"
href="https://unpkg.com/leaflet/dist/leaflet.css">


<style>


html,body{

margin:0;

height:100%;

font-family:sans-serif;

}


#map{

height:100%;

}



#panel{

position:absolute;

z-index:999;

top:10px;

left:10px;

background:white;

padding:12px;

border-radius:10px;

box-shadow:0 0 10px #555;

width:300px;

}



textarea{

width:100%;

height:70px;

}



button{

width:100%;

padding:8px;

margin-top:5px;

}



.eq-pin{

border-radius:50%;

border:2px solid white;

}



/* 凡例 */

.legend{


position:absolute;

z-index:999;


right:10px;

bottom:10px;


background:white;


padding:10px;


border-radius:10px;


box-shadow:0 0 8px #555;


font-size:14px;


}


</style>

</head>



<body>


<div id="panel">


<h3>🌍 QuakeEarth</h3>



<textarea id="input"

placeholder="2026/06/26 15:41 北緯35.8度 東経138.3度 2.6 10km">

</textarea>



<button onclick="addEarthquake()">

地震追加

</button>



<button onclick="togglePlate()">

プレート ON/OFF

</button>



<button onclick="toggleFault()">

活断層 ON/OFF

</button>



<button onclick="deleteAll()">

地震 全削除

</button>



</div>




<div class="legend">


<b>地震規模</b><br>

🟢 M0〜2.9<br>

🟡 M3〜4.9<br>

🟠 M5〜6.9<br>

🔴 M7以上


</div>




<div id="map"></div>




<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>




<script>


const map =


L.map("map")


.setView([36,138],5);





L.tileLayer(


"https://tile.openstreetmap.org/{z}/{x}/{y}.png"


)


.addTo(map);






let pins=[];





// ======================
// プレート
// ======================


let plateLayer=null;


let plateVisible=false;




fetch("data/plates.json")


.then(r=>{


if(!r.ok)

throw new Error();


return r.json();


})


.then(data=>{



plateLayer =


L.geoJSON(


data,


{


style:{


color:"purple",


weight:2,


fillColor:"#8844aa",


fillOpacity:0.15


},





onEachFeature:function(feature,layer){



let p=feature.properties;



layer.bindPopup(



`

<h3>${p.name}</h3>


英名：

${p.english}


<br>


種類：

${p.type}


`



);



}


}



);



})



.catch(()=>{


console.log(

"plates.json 読込失敗"

);


});








function togglePlate(){



if(!plateLayer){


alert(

"プレートJSONを読み込めません"

);


return;


}



if(plateVisible){



map.removeLayer(plateLayer);



plateVisible=false;



}

else{



plateLayer.addTo(map);



plateVisible=true;



}


}








// ======================
// 活断層
// ======================



let faultLayer=null;


let faultVisible=false;




fetch("data/faults.json")


.then(r=>r.json())


.then(data=>{


faultLayer =



L.geoJSON(


data,


{


style:{


color:"red",


weight:3


},





onEachFeature:function(f,l){



l.bindPopup(


`

<h3>

${f.properties.name}

</h3>


活断層


`

);



}



}



);



});






function toggleFault(){



if(!faultLayer)

return;



if(faultVisible){



map.removeLayer(faultLayer);



faultVisible=false;



}

else{



faultLayer.addTo(map);



faultVisible=true;



}



}









// ======================
// 地震ピン
// ======================



function magColor(m){



if(m>=7)

return "red";



if(m>=5)

return "orange";



if(m>=3)

return "yellow";



return "green";


}






function pinSize(m){



return Math.max(

12,

m*4

);



}







function addEarthquake(){



let text =


document.getElementById("input")


.value.trim();





let a=text.split(/\s+/);





if(a.length<6){


alert(

"入力形式エラー"

);


return;


}






let date=a[0]+" "+a[1];





let lat=



Number(

a[2]

.replace("北緯","")

.replace("度","")

);






let lon=



Number(

a[3]

.replace("東経","")

.replace("度","")

);






let mag=Number(a[4]);





let depth=

a[5].replace("km","");








let s=pinSize(mag);





let icon=



L.divIcon({



className:"eq-pin",



html:


`

<div style="


width:${s}px;


height:${s}px;


background:${magColor(mag)};


border-radius:50%;


"></div>



`,



iconSize:[s,s],



iconAnchor:[s/2,s/2]



});








let marker=



L.marker(



[lat,lon],



{

icon:icon

}



)


.addTo(map);








let id=pins.length;





marker.bindPopup(



`

<h3>${date}</h3>


M ${mag}


<br>


深さ ${depth}km


<br>


北緯 ${lat}


<br>


東経 ${lon}



<br><br>



<button onclick="deletePin(${id})">


この地震を削除


</button>



`

);



pins.push(marker);







// 自動ズームなし



document.getElementById("input").value="";



}







function deletePin(i){



if(pins[i]){


map.removeLayer(pins[i]);


pins[i]=null;


}



}








function deleteAll(){



pins.forEach(p=>{



if(p)


map.removeLayer(p);



});



pins=[];



}



</script>



</body>

</html>
